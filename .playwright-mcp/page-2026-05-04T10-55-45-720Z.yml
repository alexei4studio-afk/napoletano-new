        - generic [ref=e108]:
          - paragraph [ref=e109]: Pizza napoletană nu este un simplu preparat — este o artă recunoscută de UNESCO ca patrimoniu cultural imaterial al umanității. La Napoletano, aducem această tradiție în București cu respect absolut față de rețetele originale.
          - paragraph [ref=e110]: Aluatul nostru dospit timp de 72 de ore din făină tip "00" importată din Campania, sosul de roșii San Marzano DOP și mozzarella fior di latte de calitate superioară — toate coapte în 90 de secunde la 450°C în cuptorul nostru cu lemne.
          - paragraph [ref=e111]: Fiecare pizza este o declarație de dragoste față de Napoli, frământată cu mâinile și coaptă cu sufletul.
